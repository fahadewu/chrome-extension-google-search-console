<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:"Hanken Grotesk",ui-sans-serif,system-ui,sans-serif;background:#f7f9ff;color:#181c20;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
  .wrap{width:100%;max-width:560px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:800;color:#005bbf;font-size:20px;margin-bottom:8px}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:#005bbf;display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:7px 6px}

  h1{font-size:30px;letter-spacing:-.01em;margin-bottom:6px}
  p.sub{color:#414754;margin-bottom:28px}
  a.card{display:flex;align-items:center;gap:16px;text-align:left;text-decoration:none;color:inherit;
         background:#fff;border:1px solid #c1c6d6;border-radius:14px;padding:18px 20px;transition:box-shadow .15s,border-color .15s}
  a.card:hover{border-color:#005bbf;box-shadow:0 8px 24px rgba(15,23,42,.06)}
  a.card .ico{width:48px;height:48px;border-radius:11px;background:#005bbf;display:flex;align-items:flex-end;justify-content:center;gap:6px;padding:12px 11px;flex:none}
  a.card .ico i{display:block;width:6px;background:#fff;border-radius:2px}
  a.card .c1{height:12px}.c2{height:20px}.c3{height:28px}
  a.card h2{font-size:17px;margin-bottom:2px}
  a.card span{color:#414754;font-size:14px}
  a.card .arrow{margin-left:auto;color:#727785;font-size:22px}
  footer{margin-top:40px;color:#727785;font-size:13px}
  footer a{color:#005bbf;text-decoration:none}

<div class="wrap">
  <div class="brand"><span class="mark"><i class="b1"></i><i class="b2"></i><i class="b3"></i></span> Algoramming</div>
